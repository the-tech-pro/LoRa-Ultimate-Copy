<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}eChook LoRa Dashboard{% endblock %}</title>
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem("dashboard-theme");
          const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = savedTheme || preferredTheme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      }());
    </script>
    <style>
      :root {
        color-scheme: light;
        --page-bg:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(20, 184, 166, 0.14), transparent 22%),
          linear-gradient(180deg, #f7fafc 0%, #e7eef5 100%);
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --surface-soft: rgba(248, 250, 252, 0.82);
        --ink: #10202d;
        --muted: #5d6c79;
        --border: rgba(16, 32, 45, 0.11);
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
        --chart-grid: rgba(16, 32, 45, 0.12);
        --card-highlight: rgba(255, 255, 255, 0.60);
        --status-ok: #166534;
        --status-wait: #b45309;
        --status-rec: #b91c1c;
        --link: #2563eb;
        --mono: "Cascadia Mono", "JetBrains Mono", "Consolas", monospace;
      }
      html[data-theme="dark"] {
        color-scheme: dark;
        --page-bg:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 24%),
          radial-gradient(circle at top right, rgba(20, 184, 166, 0.14), transparent 22%),
          linear-gradient(180deg, #08111c 0%, #0e1725 100%);
        --surface: rgba(12, 20, 31, 0.82);
        --surface-strong: rgba(14, 24, 36, 0.96);
        --surface-soft: rgba(18, 30, 46, 0.82);
        --ink: #e2ebf5;
        --muted: #8da0b2;
        --border: rgba(148, 163, 184, 0.18);
        --shadow: 0 28px 70px rgba(2, 6, 23, 0.42);
        --chart-grid: rgba(148, 163, 184, 0.16);
        --card-highlight: rgba(148, 163, 184, 0.08);
        --status-ok: #4ade80;
        --status-wait: #fbbf24;
        --status-rec: #f87171;
        --link: #60a5fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Aptos", "Segoe UI Variable", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background: var(--page-bg);
      }
      button,
      input,
      select,
      table,
      textarea {
        font: inherit;
      }
      a {
        color: var(--link);
      }
      .page {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px;
      }
      .app-shell {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 24px;
        align-items: start;
      }
      .content-shell {
        min-width: 0;
      }
      .hero,
      .status-row,
      .metric-grid,
      .chart-toolbar,
      .chart-frame,
      .chart-footer,
      .table-top,
      .card-grid,
      .storage-grid,
      .playback-toolbar {
        display: grid;
        gap: 16px;
      }
      .hero {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        margin-bottom: 18px;
      }
      .eyebrow,
      .section-tag,
      .metric-label,
      .status-label,
      .selector-meta,
      .subtle,
      th,
      label {
        margin: 0;
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }
      .hero h1,
      .chart-title,
      .table-title,
      .section-title {
        margin: 10px 0 12px;
        line-height: 0.92;
        letter-spacing: -0.05em;
      }
      .hero h1 {
        font-size: clamp(2.5rem, 5vw, 4.7rem);
      }
      .chart-title,
      .table-title,
      .section-title {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
      }
      .hero-copy,
      .status-card,
      .metric-card,
      .chart-card,
      .table-card,
      .panel-card {
        background: var(--surface);
        border: 1px solid var(--card-highlight);
        box-shadow: var(--shadow);
        border-radius: 28px;
        backdrop-filter: blur(18px);
      }
      .hero-copy,
      .chart-card,
      .table-card,
      .panel-card {
        padding: 24px;
      }
      .hero-copy p,
      .chart-note,
      .table-note,
      .muted {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }
      .hero-actions,
      .row-actions,
      .action-group,
      .recording-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .hero-actions {
        justify-content: end;
      }
      .recording-actions {
        justify-content: end;
        align-self: center;
      }
      .recording-actions .button,
      .recording-actions select {
        min-height: 44px;
      }
      .recording-actions select {
        width: auto;
        min-width: 88px;
      }
      .theme-toggle,
      .button,
      .tab-button,
      .icon-button {
        border: 1px solid var(--border);
        background: var(--surface-strong);
        color: var(--ink);
        padding: 12px 16px;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .tab-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .button.primary,
      .tab-button.active {
        background: var(--ink);
        color: var(--surface-strong);
        border-color: transparent;
      }
      .button.danger {
        color: var(--status-rec);
      }
      .button:disabled,
      .tab-button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status-row {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 18px;
      }
      .status-card,
      .metric-card,
      .storage-card {
        padding: 18px 20px;
        border: 1px solid var(--border);
        min-width: 0;
      }
      .storage-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .status-pill,
      .recording-pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        width: fit-content;
        padding: 12px 14px;
        border-radius: 999px;
        font-weight: 700;
        background: var(--surface-strong);
        border: 1px solid var(--border);
      }
      .status-pill.connected { color: var(--status-ok); }
      .status-pill.waiting { color: var(--status-wait); }
      .recording-pill.active { color: var(--status-rec); }
      .recording-pill.idle { color: var(--muted); }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 0 0 currentColor;
        animation: pulse 2.1s infinite;
      }
      .status-pill.waiting .dot,
      .recording-pill.idle .dot {
        animation: none;
      }
      .status-value,
      .metric-value,
      .storage-value {
        display: block;
        margin-top: 8px;
        font-size: 1.05rem;
        line-height: 1.4;
        overflow-wrap: anywhere;
      }
      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-bottom: 18px;
      }
      .metric-card {
        position: relative;
        overflow: hidden;
      }
      .metric-card::after {
        content: "";
        position: absolute;
        inset: auto -24% -46% auto;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: var(--metric-glow, rgba(59, 130, 246, 0.18));
        filter: blur(12px);
        pointer-events: none;
      }
      .metric-head,
      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .metric-number-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin: 18px 0 8px;
      }
      .metric-number {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 0.9;
        letter-spacing: -0.05em;
      }
      .metric-unit {
        color: var(--muted);
        font-weight: 700;
      }
      .metric-updated,
      .playback-copy {
        margin: 0;
        color: var(--muted);
      }
      .chart-card,
      .table-card,
      .panel-card {
        margin-bottom: 18px;
      }
      .chart-toolbar,
      .playback-toolbar {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }
      .selector-list,
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .sidebar-card {
        position: sticky;
        top: 24px;
        min-height: calc(100vh - 48px);
        padding: 20px;
        border-radius: 28px;
        background: var(--surface);
        border: 1px solid var(--card-highlight);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .sidebar-title {
        margin: 10px 0 12px;
        line-height: 0.98;
        letter-spacing: -0.04em;
        font-size: clamp(1.5rem, 3vw, 2.1rem);
      }
      .sidebar-nav {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }
      .sidebar-nav .tab-button {
        width: 100%;
        justify-content: flex-start;
        text-align: left;
        border-radius: 18px;
        padding: 14px 16px;
      }
      .selector-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-soft);
        color: var(--muted);
        cursor: pointer;
      }
      .selector-chip.active {
        color: var(--ink);
        background: var(--surface-strong);
        border-color: rgba(148, 163, 184, 0.34);
      }
      .selector-swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .chart-shell {
        margin-top: 18px;
        padding: 18px;
        border-radius: 24px;
        background: var(--surface-soft);
        border: 1px solid var(--border);
      }
      .chart-frame {
        grid-template-columns: auto minmax(0, 1fr);
      }
      .chart-scale {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 8px;
        min-width: 64px;
        color: var(--muted);
        font-size: 0.9rem;
        padding-right: 10px;
      }
      .chart-canvas {
        position: relative;
        min-height: 360px;
      }
      .chart-svg {
        width: 100%;
        height: 360px;
        display: block;
      }
      .chart-grid-line {
        stroke: var(--chart-grid);
        stroke-width: 1;
      }
      .chart-axis-line {
        stroke: var(--chart-grid);
        stroke-width: 1.2;
      }
      .chart-path {
        fill: none;
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chart-endpoint {
        stroke: none;
      }
      .chart-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        text-align: center;
        color: var(--muted);
        border-radius: 20px;
        border: 1px dashed var(--border);
        background: rgba(255, 255, 255, 0.10);
      }
      .hidden {
        display: none !important;
      }
      .chart-footer {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 14px;
      }
      .chart-stat,
      .recording-banner,
      .lap-card,
      .setting-card {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
      }
      .chart-stat strong,
      .storage-card strong {
        display: block;
        margin-top: 6px;
        font-size: 1rem;
        overflow-wrap: anywhere;
      }
      .recording-banner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }
      .storage-detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 18px;
      }
      .table-top {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }
      .table-shell {
        overflow-x: auto;
        margin-top: 18px;
        border-radius: 22px;
        border: 1px solid var(--border);
        background: var(--surface-soft);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 14px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      .table-strong {
        font-weight: 700;
      }
      .mono {
        font-family: var(--mono);
      }
      .tab-panel {
        margin-top: 18px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .field {
        display: grid;
        gap: 8px;
      }
      input,
      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
        color: var(--ink);
      }
      .timeline {
        width: 100%;
      }
      .lap-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .stack {
        display: grid;
        gap: 16px;
      }
      .notice {
        color: var(--status-rec);
        font-weight: 700;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.22); }
        70% { box-shadow: 0 0 0 12px rgba(74, 222, 128, 0); }
        100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
      }
      @media (max-width: 1080px) {
        .app-shell {
          grid-template-columns: 1fr;
        }
        .sidebar-card {
          position: static;
          min-height: auto;
        }
        .sidebar-nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .status-row,
        .metric-grid,
        .chart-footer,
        .storage-grid,
        .storage-detail-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 820px) {
        .hero,
        .chart-toolbar,
        .table-top,
        .chart-frame,
        .playback-toolbar,
        .field-grid {
          grid-template-columns: 1fr;
        }
        .hero-actions {
          justify-content: start;
        }
        .recording-banner {
          grid-template-columns: 1fr;
        }
        .recording-actions {
          justify-content: start;
          align-self: start;
        }
        .chart-scale {
          flex-direction: row;
          min-width: 0;
          padding-right: 0;
        }
      }
      @media (max-width: 640px) {
        .page {
          padding: 16px;
        }
        .hero-copy,
        .status-card,
        .metric-card,
        .chart-card,
        .table-card,
        .panel-card {
          border-radius: 22px;
        }
        .hero-copy,
        .chart-card,
        .table-card,
        .panel-card {
          padding: 18px;
        }
        .status-row,
        .metric-grid,
        .chart-footer,
        .storage-grid,
        .storage-detail-grid,
        .sidebar-nav {
          grid-template-columns: 1fr;
        }
        th,
        td {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      {% block body %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
